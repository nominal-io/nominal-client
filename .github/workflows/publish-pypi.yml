name: Publish PyPI
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to simulate (e.g. nominal-tdms-v1.143.1)'
        required: true
  push:
    tags:
      - "v*.*.*"
      - "*-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Determine package from tag
        id: package
        run: |
          TAG="${{ github.event.inputs.tag || env.GITHUB_REF_NAME }}"
          if [[ "$TAG" == v* ]]; then
            echo "name=nominal" >> "$GITHUB_OUTPUT"
          else
            echo "name=${TAG%-v*}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build package
        run: uv build --package ${{ steps.package.outputs.name }}
      - name: Publish to PyPI
        if: github.event_name == 'push'
        run: uv publish --trusted-publishing always
