name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: depot-ubuntu-24.04-small
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@1dd74842e568f373608605d9e45c9e854f65f543 # v1
        env:
          CLAUDE_CODE_SUBAGENT_MODEL: claude-sonnet-4-6
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          classify_inline_comments: 'false'
          allowed_bots: "devin-ai-integration[bot]"

          prompt: |
            REPO: ${{ github.repository }}

            If asked to review a PR follow the following directives:
            ```
            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Type safety (strict mypy)
            - please prefer a doc-led disclosure of PR reviews over pre-training
            - Pay attention to directories like docs/ for references potential guidance of best practices.
            - Ensure you always pay attention to AGENTS.md too.

            Note: The PR branch is already checked out in the current working directory.

            Before responding to review requests on PRs, first read existing PR comments
            and review comments using `gh pr view` and `gh api` to understand what feedback
            has already been given. Do NOT duplicate or re-raise issues that have already
            been flagged by prior reviews (automated or human). Only add new, unaddressed
            observations or directly answer what the user asked.
            ```

            If it is anything else but a review of a PR. Do as they request.

          claude_args: |
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(uv:*),Bash(just:*),Bash(ls:*),Bash(find:*),Bash(wc:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"
            --model claude-opus-4-6
