name: Claude Code Review

# Only run on PRs that are made against the main branch
on:
  pull_request:
    # Both activity types are required for full, non-duplicated coverage:
    #   - opened: a PR opened directly as non-draft emits ONLY `opened` (never `ready_for_review`)
    #   - ready_for_review: fires ONLY on the draft -> ready transition
    # The `draft == false` job guard below skips drafts that arrive via `opened`, so the two
    # types together review every non-draft PR exactly once. Dropping `opened` would silently
    # skip every PR opened directly in a ready-for-review state.
    types: [opened, ready_for_review]
    branches: ["main"]

# Serialize reviews per PR; don't cancel in-flight runs (they may have
# half-posted tracking comments).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    # Skip draft PRs and PRs on forks
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: depot-ubuntu-24.04-small
    permissions:
      contents: read
      pull-requests: write
      issues: write # react (👍) to prior reviewers' conversation comments via the reactions API
      id-token: write
      actions: read # token scope for reading CI results; paired with additional_permissions below
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history so the granted git tools (git diff/log/show) can diff against the PR
          # base ref; a depth-1 shallow checkout only contains the head commit. `gh pr diff`
          # works either way (it uses the API), but local git range commands need this.
          fetch-depth: 0

      - name: Review with Claude
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1.0.120
        env:
          # Run subagents using cheaper, faster agents while leaving higher level thinking
          # to the higher tier model (opus 4.8)
          CLAUDE_CODE_SUBAGENT_MODEL: claude-sonnet-4-6
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          allowed_bots: "devin-ai-integration[bot]"
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"

          # Buffers inline comments and only posts high signal messages that have passed an internal review
          classify_inline_comments: "true"

          # Append "Fix this" links to inline review feedback so a reviewer can open Claude Code locally
          # with the issue context pre-loaded
          include_fix_links: "true"

          # Dump Claude Code's full output to the Actions log so we can
          # surface the review's full reasoning and tool I/O in logs (the action hides this by default).
          show_full_output: "true"

          # Enables Claude to read CI/Actions results. Required IN ADDITION to the job-level
          # `actions: read` permission above — the two are complementary, not redundant.
          additional_permissions: |
            actions: read

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request by running /code-review --comment and invoking the
            thermo-nuclear-code-quality-review skill (via the Skill tool) as its structural lens.
            These checks layer on top of the plugin's defaults; also follow any AGENTS.md /
            CLAUDE.md conventions you find in the repo. This is ONE review — the skill provides the
            analytical lens, but the rules below govern output and OVERRIDE the skill's own
            formatting expectations: post findings terse and inline (or in the single top-level
            overview), never as a separate verbose structural report.

            ## Where feedback goes
            - Top-level overview (write ONCE, terse but thorough): judge the architecture and
              ergonomics of the PR's public/API surface and how well it coheres with existing repo
              conventions. This is the ONLY place for positive notes — call out genuinely novel or
              well-executed design here, briefly.
            - Inline comments: targeted, intentional, actionable — defects or convention divergences
              only, one concern per comment. Link to an external resource only when it genuinely
              clarifies a concept and adds something beyond your own explanation.

            ## What to flag (each a distinct axis)
            - Breaking changes: any change to an existing public method's signature or behavior. We
              deprecate across releases before removal — explicitly flag changes that skip that path.
            - Missing tests: nudge when new logic is more than a thin wrapper over an existing
              endpoint, or when nontrivial business logic ships untested. Don't ask for tests on
              trivially correct plumbing.
            - Test quality: tests must assert behavior (not implementation), carry a one-line
              docstring, and prefer MagicMock over monkeypatching. Flag superfluous tests that
              assert nothing meaningful.
            - Docstrings: public methods need google-style docstrings describing behavior (not
              implementation), with an Args block and a Returns/Raises block where relevant.
            - API ergonomics: required params positional, optional config keyword-only — consistent
              with the rest of the public surface (look across the repo to infer the convention).
              Flag divergence.
            - Tooling: this project uses `uv run`; flag any `python -m` or bare `python` invocation.
            - Type design: strict mypy runs in CI and already fails on type errors — do NOT restate
              them. Comment only to suggest a better type boundary/contract, framed as a suggestion.
            - Structure & maintainability (thermo-nuclear lens): flag declining abstraction quality,
              files crossing a healthy size boundary, spaghetti/branching bolted onto existing flows,
              and behavior-preserving "code-judo" simplifications. Suggest the restructuring
              concretely; keep these high-conviction, not nitpicks.

            ## Never (hard guardrails)
            - Never comment to praise, agree, or say something is fine. Positive notes go in the
              overview, once.
            - Never flag anything a linter, formatter, or type-checker already catches (ruff, mypy).
            - Never run tests, linters, type-checkers, or builds, and never edit files: this is a
              read-only, static review and CI already runs ruff/mypy/tests. If verifying a claim
              would require running code, note the gap in the review rather than attempting the
              call (it will be denied and waste turns).
            - Never restate a point a prior reviewer (human or bot) already made. Instead, add a
              👍 reaction to their comment via the GitHub reactions API (`gh api --method POST
              /repos/{owner}/{repo}/issues/comments/{id}/reactions -f content=+1`, or the
              `/pulls/comments/{id}/reactions` endpoint for inline review comments) — never repeat
              the point as a new comment.
            - Never reference customer, project, or implementation-repo names; describe patterns
              generically.

            Tone: terse and high-signal everywhere. Every comment must earn its place.

          # Configurations:
          #   - Pinning the review model explicitly (bump deliberately as newer models ship)
          #   - Setting max turns to 50 to bound cost while leaving headroom for the deeper
          #     /code-review + thermo-nuclear pass. This measures total round trips between github and claude
          #   - Setting explicit tools that may be used during the review without any further authorization
          #   - `Bash(gh api:*)` is granted so Claude can 👍 prior reviewers' comments via the reactions
          #     API (paired with `issues: write` above). Note it's broad: gh api can reach any endpoint
          #     the token's scopes allow, so keep the permissions block tight.
          #   - `Skill` is granted so the review can invoke the thermo-nuclear-code-quality-review
          #     skill; without it the Skill tool is blocked and the skill silently never loads.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Skill,mcp__github_comment__update_claude_comment,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh api:*),mcp__github__get_pull_request_comments,mcp__github__get_pull_request_reviews,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(wc:*),WebFetch,WebSearch"
