name: Claude Code Review

# Only run on PRs that are made against the main branch
on:
  pull_request:
    types: [opened, ready_for_review]
    branches: ["main"]

# Serialize reviews per PR; don't cancel in-flight runs (they may have
# half-posted tracking comments).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    # Skip draft PRs and PRs on forks
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: depot-ubuntu-24.04-small
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Review with Claude
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1.0.120
        env:
          # Run subagents using cheaper, faster agents while leaving higher level thinking
          # to the higher tier model (4.7)
          CLAUDE_CODE_SUBAGENT_MODEL: claude-sonnet-4-6
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          allowed_bots: "devin-ai-integration[bot]"
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"

          # Buffers inline comments and only posts high signal messages that have passed an internal review
          classify_inline_comments: "true"

          additional_permissions: |
            actions: read

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run /code-review --comment to review this pull request.

            In addition to the plugin's standard checks, pay close attention to any conventions laid out in an
            AGENTS.md or CLAUDE.md file that you may find within the repository for project-specific conventions
            and patterns

            When reviewing a PR, be terse yet informative in the top level description. This is the place to provide
            thorough high level review of the code in the PR-- things like general ergonomics of any public surface area
            added by the PR, or general architectural fit of the changes and how well it coheres with general high level
            conventions of existing code. Be terse yet informative via targeted, intentional comments on the PR, and link 
            to resources on the internet when it would be helpful to explain a concept or issue (but only when it truly adds
            something to what you're saying).

            ## Project preferences (apply on top of the plugin's standard checks)
            - Python invocations use `uv run`, never `python -m` or bare `python`.
            - Never reference customer, project, or implementation-repo names; describe patterns generically.
            - Pay particular attention to changes in existing public methods both in interface and behavior. We
              follow a strict model of using deprecation notices for a series of releases before we remove existing
              function calls or arguments for public methods. Call out breaking API or behavioral changes explicitly.
            - This repository uses strict mypy for enforcing type safety. We have existing automations that will fail
              a review if it detects any issues with type safety: instead of merely pointing out issues that are already
              obvious, consider carefully if there is insight you can deliver about bigger picture updates to the issue
              in particular to provide a nuanced alternative opinion. If not, don't bother commenting, but if so, give a terse yet
              informative comment with a suggestion, but word it as such.
            - Don't duplicate observations already raised by a prior reviewer (bot or human). 
              If either already made a point you'd make, thumbs-up their comment instead of restating.
            - Be terse. Flag real issues only — skip style nits that ruff already enforces, and skip filler praise.
            - Nudge for tests when new logic isn't a thin wrapper around an existing endpoint.
            - Never comment inline with the intent of praising or stating that something is good: this is wasteful filler.
              Instead, as the top level review message, you should judge the overall architecture and ergonomics of the changed
              API surface area, or novel and well done implementation details, but only once, tersely, and in the top level overview.
            - Ensure that all public methods have solid google-style docstrings that contain an Args: block and a Returns: or
              Raises: block when relevant. Docstrings for public methods should describe behaviors, not implementations.
            - All unit tests and integration / e2e tests should have a terse docstring describing the behavior being tested.
              Prefer MagicMock to monkeypatching, and ensure that tests are testing behaviors instead of implementations. Call
              out superfluous tests that aren't adding anything, while also call out testable surface that is missing from new
              nontrivial code. We should have well tested business logic but not waste energy on trivially correct plumbing.
            - Public API methods should prefer using keyword-only arguments for optional configuration where sensible. Use args
              for required parameters and generally look to elsewhere across the public surface area of the repository to
              build a sense of conventions of how we handle the split. Call out places where new code diverges from existing standards.

          # Configurations:
          #   - Using current latest SOTA model
          #   - Setting max turns to 25 to bound cost. This measures total number of round trips between github and claude
          #   - Setting explicit tools that may be used during the review without any further authorization
          claude_args: |
            --model claude-opus-4-7
            --max-turns 25
            --allowedTools "mcp__github_comment__update_claude_comment,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),mcp__github__get_pull_request_comments,mcp__github__get_pull_request_reviews,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(wc:*)"
