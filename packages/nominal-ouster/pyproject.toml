[project]
name = "nominal-ouster"
version = "1.146.0"
description = "Ouster pointcloud integration for the Nominal Python Client"
authors = [
    { name = "Alexander Reynolds", email = "alex.reynolds@nominal.io" },
    { name = "Drake Eidukas", email = "drake@nominal.io" },
]
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
readme = { text = "Ouster pointcloud integration for the Nominal Python Client", content-type = "text/markdown" }
requires-python = ">=3.10,<4"
dependencies = [
    "nominal>=1.143.0",
    # dagger-client is used by upload_point_cloud to call dagger directly via scout's reverse proxy at /api/dagger.
    "dagger-client>=30.0.0,<31",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "ouster-sdk>=0.16.2",
]

[project.urls]
Homepage = "https://nominal.io"
Documentation = "https://docs.nominal.io"
Repository = "https://github.com/nominal-io/nominal-client"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["LICENSE", "NOTICE", "nominal/ouster/**"]

[tool.hatch.build.targets.wheel]
include = ["LICENSE", "NOTICE", "nominal/ouster/**"]
