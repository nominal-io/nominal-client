[project]
name = "nominal-tdms"
version = "1.143.0"
description = "TDMS integrations for the Nominal Python client"
authors = [
    { name = "Alexander Reynolds", email = "alex.reynolds@nominal.io" },
    { name = "Alexander Hill", email = "alex.hill@nominal.io" },
    { name = "JP", email = "jack@nominal.io" },
    { name = "Drake Eidukas", email = "drake@nominal.io" },
]
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
readme = { text = "TDMS integrations for the Nominal Python client.", content-type = "text/markdown" }
requires-python = ">=3.10,<4"
dependencies = ["nominal>=1.143.0", "nptdms>=1.9.0,<2"]

[project.urls]
Homepage = "https://nominal.io"
Documentation = "https://docs.nominal.io"
Repository = "https://github.com/nominal-io/nominal-client"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# PEP 420 namespace package (no nominal/__init__.py); merges into the shared
# `nominal` namespace. The `nominal/tdms/**` glob must ship the py.typed marker
# so mypy can type-check `nominal.tdms` as an installed package (PEP 561).
[tool.hatch.build.targets.sdist]
include = ["LICENSE", "NOTICE", "nominal/tdms/**"]

[tool.hatch.build.targets.wheel]
include = ["LICENSE", "NOTICE", "nominal/tdms/**"]
