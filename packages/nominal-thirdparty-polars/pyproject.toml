[project]
name = "nominal-thirdparty-polars"
version = "1.143.0"
description = "Polars integrations for the Nominal Python client"
authors = [
    { name = "Alexander Reynolds", email = "alex.reynolds@nominal.io" },
    { name = "Alexander Hill", email = "alex.hill@nominal.io" },
    { name = "JP", email = "jack@nominal.io" },
    { name = "Michael Bauer", email = "michael@nominal.io" },
    { name = "Drake Eidukas", email = "drake@nominal.io" },
]
license = "MIT"
readme = { text = "Polars integrations for the Nominal Python client.", content-type = "text/markdown" }
requires-python = ">=3.10,<4"
dependencies = [
    "nominal==1.143.0",
    "nominal-api==0.1224.0",
    "polars>=0.0.0",
    "typing-extensions>=4,<5",
]

[project.urls]
Homepage = "https://nominal.io"
Documentation = "https://docs.nominal.io"
Repository = "https://github.com/nominal-io/nominal-client"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["nominal/thirdparty/polars/**"]

[tool.hatch.build.targets.wheel]
include = ["nominal/thirdparty/polars/**"]
